<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f0f2f5; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; }
        .chart-container { flex: 1; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); padding: 20px; }
        .chart { width: 100%; height: 500px; }
        h3 { margin: 0 0 15px 0; color: #333; text-align: center; }
    </style>
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
</head>
<body>

<div class="row">
    <div class="chart-container">
        <h3>酒店房型入住频次与深度评价偏好 (Top 15)</h3>
        <div id="mainChart" class="chart"></div>
    </div>
</div>

<script>
    async function init() {
        const c1 = echarts.init(document.getElementById('mainChart'));
        const res = await axios.get('http://127.0.0.1:8000/api/analysis/b2_room');
        const data = res.data.data;

        // 倒序排列以适合横向柱状图
        data.reverse();

        const roomTypes = data.map(d => d.roomType);
        const counts = data.map(d => d.count);
        const longCounts = data.map(d => d.long_count);

        c1.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            legend: { 
                data: ['总入住频次(评论数)', '长评分享频次(>50字)'],
                top: 0
            },
            grid: { top: '10%', left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'value' },
            yAxis: { type: 'category', data: roomTypes },
            series: [
                {
                    name: '总入住频次(评论数)',
                    type: 'bar',
                    data: counts,
                    itemStyle: { color: '#fac858' }
                },
                {
                    name: '长评分享频次(>50字)',
                    type: 'bar',
                    data: longCounts,
                    itemStyle: { color: '#ee6666' }
                }
            ]
        });

        window.addEventListener('resize', () => { c1.resize(); });
    }
    window.onload = init;
</script>
</body>
</html>
