<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f0f2f5; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; }
        .chart-container { flex: 1; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); padding: 20px; }
        .chart { width: 100%; height: 350px; }
        h3 { margin: 0 0 15px 0; color: #333; text-align: center; }
    </style>
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
</head>
<body>

<div class="row">
    <!-- 带图分布 -->
    <div class="chart-container">
        <h3>消费者晒图分享占比</h3>
        <div id="c1" class="chart"></div>
    </div>
    <!-- 点赞互动分布 -->
    <div class="chart-container">
        <h3>评价是否获赞</h3>
        <div id="c2" class="chart"></div>
    </div>
    <!-- 商家回复分布 -->
    <div class="chart-container">
        <h3>商家是否跟进回复</h3>
        <div id="c3" class="chart"></div>
    </div>
</div>

<script>
    async function init() {
        const c1 = echarts.init(document.getElementById('c1'));
        const c2 = echarts.init(document.getElementById('c2'));
        const c3 = echarts.init(document.getElementById('c3'));

        const res = await axios.get('http://127.0.0.1:8000/api/analysis/b6_interaction');
        const data = res.data.data;

        function getGaugeOption(chartData, color, posKeyword) {
            const total = chartData.reduce((s, d) => s + d.value, 0);
            const posItem = chartData.find(d => d.name.includes(posKeyword)) || chartData[0];
            const rate = total > 0 ? (posItem.value / total * 100).toFixed(1) : 0;
            return {
                series: [{
                    type: 'gauge',
                    startAngle: 200,
                    endAngle: -20,
                    min: 0,
                    max: 100,
                    progress: { show: true, width: 20, itemStyle: { color: color } },
                    axisLine: { lineStyle: { width: 20, color: [[1, '#e0e6f1']] } },
                    axisTick: { show: false },
                    splitLine: { show: false },
                    axisLabel: { show: false },
                    pointer: { show: false },
                    anchor: { show: false },
                    title: { show: true, offsetCenter: [0, '70%'], fontSize: 14, color: '#666' },
                    detail: {
                        valueAnimation: true, offsetCenter: [0, '0%'],
                        fontSize: 30, fontWeight: 'bold', color: color,
                        formatter: '{value}%'
                    },
                    data: [{ value: rate, name: posItem.name }]
                }]
            };
        }

        c1.setOption(getGaugeOption(data.pic_dist, '#5470c6', '晒图'));
        c2.setOption(getGaugeOption(data.like_dist, '#fac858', '已获'));
        c3.setOption(getGaugeOption(data.reply_dist, '#73c0de', '已回复'));

        window.addEventListener('resize', () => { c1.resize(); c2.resize(); c3.resize(); });
    }
    window.onload = init;
</script>
</body>
</html>
