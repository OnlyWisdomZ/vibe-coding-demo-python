<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f0f2f5; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; }
        .chart-container { flex: 1; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); padding: 20px; position: relative; }
        .chart { width: 100%; height: 400px; }
        h3 { margin: 0 0 15px 0; color: #333; text-align: center; }
        .toggle-btn { position: absolute; top: 20px; right: 20px; padding: 6px 12px; cursor: pointer; background-color: #409eff; color: white; border: none; border-radius: 4px; font-size: 14px; }
        .toggle-btn:hover { background-color: #66b1ff; }
    </style>
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
</head>
<body>

<div class="row">
    <!-- 合并图表：评论发布与入住时段特征 -->
    <div class="chart-container">
        <h3>评论发布时间与入住时段特征分析</h3>
        <button id="toggleBtn" class="toggle-btn">切换为评论发布数折线图</button>
        <div id="mainChart" class="chart" style="height: 500px;"></div>
    </div>
</div>

<script>
    async function init() {
        const chart = echarts.init(document.getElementById('mainChart'));

        const res = await axios.get('http://127.0.0.1:8000/api/analysis/b4_time');
        const data = res.data.data;

        // 整理所有的时间轴节点
        const timesSet = new Set();
        data.post_trend.forEach(d => timesSet.add(d.time));
        data.checkin_trend.forEach(d => timesSet.add(d.month));

        // 自然升序排列
        const axisData = Array.from(timesSet).sort();

        // 匹配对齐数据点
        const postCounts = [];
        const checkinCounts = [];

        axisData.forEach(t => {
            const p = data.post_trend.find(d => d.time === t);
            postCounts.push(p ? p.count : 0);

            const c = data.checkin_trend.find(d => d.month === t);
            checkinCounts.push(c ? c.count : 0);
        });

        let currentView = 'bar'; // 'bar' for checkin, 'line' for post

        function updateChart() {
            const isBar = currentView === 'bar';
            chart.setOption({
                tooltip: {
                    trigger: 'item',
                    formatter: function (params) {
                        return `${params.name}<br/>${params.marker} ${params.seriesName}: <b>${params.value}</b>`;
                    }
                },
                legend: { data: isBar ? ['入住人次'] : ['评论发布数'] },
                xAxis: { type: 'category', data: axisData, axisLabel: { rotate: 30 } },
                yAxis: [
                    { type: 'value', name: '数量(条/人次)', position: 'left', minInterval: 1 }
                ],
                series: isBar ? [
                    {
                        name: '入住人次',
                        type: 'bar',
                        data: checkinCounts,
                        itemStyle: { color: '#fac858' },
                        barMaxWidth: 50
                    }
                ] : [
                    {
                        name: '评论发布数',
                        type: 'line',
                        data: postCounts,
                        smooth: true,
                        itemStyle: { color: '#5470c6' },
                        lineStyle: { width: 3 },
                        symbolSize: 8
                    }
                ]
            }, true);
        }

        updateChart();

        document.getElementById('toggleBtn').addEventListener('click', () => {
            if (currentView === 'bar') {
                currentView = 'line';
                document.getElementById('toggleBtn').innerText = '切换为入住人次柱状图';
            } else {
                currentView = 'bar';
                document.getElementById('toggleBtn').innerText = '切换为评论发布数折线图';
            }
            updateChart();
        });

        window.addEventListener('resize', () => { chart.resize(); });
    }
    window.onload = init;
</script>
</body>
</html>
