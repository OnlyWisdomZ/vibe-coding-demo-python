<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f0f2f5; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .chart-container { flex: 1; min-width: 45%; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); padding: 20px; }
        .chart { width: 100%; height: 450px; }
        h3 { margin: 0 0 15px 0; color: #333; text-align: center; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-top: -10px; margin-bottom: 20px; }
    </style>
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
</head>
<body>

<div style="text-align: center; margin-bottom: 20px;">
    <label for="provSelect" style="font-size: 16px; font-weight: bold; color: #333;">切换对比省份：</label>
    <select id="provSelect" style="padding: 5px 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; outline: none;"></select>
</div>

<div class="row">
    <!-- 图1：评价基础声量 -->
    <div class="chart-container">
        <h3>同省酒店基础评价声量对比</h3>
        <div id="subtitle1" class="subtitle">正在分析...</div>
        <div id="c1" class="chart"></div>
    </div>

    <!-- 图2：各项服务/转化指标雷达图 -->
    <div class="chart-container">
        <h3>同省酒店多维运营指标雷达分析</h3>
        <div id="subtitle2" class="subtitle">正在分析...</div>
        <div id="c2" class="chart"></div>
    </div>
</div>

<script>
    let c1, c2;
    let isFirstLoad = true;

    async function loadData(province = '') {
        const url = province ? `http://127.0.0.1:8000/api/analysis/b7_city?province=${province}` : 'http://127.0.0.1:8000/api/analysis/b7_city';
        const res = await axios.get(url);
        
        if (res.data.message !== "success") {
            document.getElementById('subtitle1').innerText = "未从数据中成功提取出同省特征";
            document.getElementById('subtitle2').innerText = "无数据";
            return;
        }

        const data = res.data.data;
        const provName = `分析省份基准: 【${data.province_name}省】`;
        document.getElementById('subtitle1').innerText = provName;
        document.getElementById('subtitle2').innerText = provName;

        // 初始化下拉框
        if (isFirstLoad && data.available_provinces) {
            const select = document.getElementById('provSelect');
            data.available_provinces.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.innerText = p + "省";
                if (p === data.province_name) opt.selected = true;
                select.appendChild(opt);
            });
            select.addEventListener('change', (e) => {
                loadData(e.target.value);
            });
            isFirstLoad = false;
        }

        const hotels = data.hotels.map(d => d.hotel);
        const counts = data.hotels.map(d => d.count);
        const avgLens = data.hotels.map(d => d.avg_len);

        // --- C1: 柱线图 (总评价数 与 平均字数) ---
        c1.setOption({
            tooltip: { 
                trigger: 'item',
                formatter: function (params) {
                    return `${params.name}<br/>${params.marker} ${params.seriesName}: <b>${params.value}</b>`;
                }
            },
            legend: { data: ['评价总数', '平均评价字数'] },
            xAxis: { 
                type: 'category', 
                data: hotels, 
                axisLabel: { interval: 0, rotate: 15, fontSize: 11 }
            },
            yAxis: [
                { type: 'value', name: '评价总数(条)', position: 'left' },
                { type: 'value', name: '平均字数', position: 'right' }
            ],
            series: [
                { name: '评价总数', type: 'bar', data: counts, yAxisIndex: 0, itemStyle: {color: '#5470c6'}, barMaxWidth: 50 },
                { name: '平均评价字数', type: 'line', data: avgLens, yAxisIndex: 1, itemStyle: {color: '#ee6666'}, symbolSize: 8, lineStyle: {width: 3} }
            ]
        });

        // --- C2: 雷达图 (放大并动态计算最大值增加区分度) ---
        const radarSeriesData = data.hotels.map(d => ({
            name: d.hotel,
            value: [d.file_rate, d.reply_rate, d.hq_rate]
        }));

        // 为了增加区分度，自动按该组数据的最大值进行适当上浮作为轴的最大刻度
        const maxFile = Math.max(...data.hotels.map(d=>d.file_rate), 10) * 1.2;
        const maxReply = Math.max(...data.hotels.map(d=>d.reply_rate), 20) * 1.2;
        const maxHq = Math.max(...data.hotels.map(d=>d.hq_rate), 1) * 1.5;

        const indicator = [
            { name: '用户带图率(%)', max: maxFile > 100 ? 100 : maxFile },
            { name: '商家回复率(%)', max: maxReply > 100 ? 100 : maxReply },
            { name: '官方优质率(%)', max: maxHq > 100 ? 100 : maxHq } 
        ];

        // 使用 clear() 防止不同省份酒店数量不同导致渲染残留
        c2.clear(); 
        c1.clear();

        // 重新渲染 C1
        c1.setOption({
            tooltip: { 
                trigger: 'item',
                formatter: function (params) {
                    return `${params.name}<br/>${params.marker} ${params.seriesName}: <b>${params.value}</b>`;
                }
            },
            legend: { data: ['评价总数', '平均评价字数'] },
            xAxis: { type: 'category', data: hotels, axisLabel: { interval: 0, rotate: 15, fontSize: 11 } },
            yAxis: [
                { type: 'value', name: '评价总数(条)', position: 'left' },
                { type: 'value', name: '平均字数', position: 'right' }
            ],
            series: [
                { name: '评价总数', type: 'bar', data: counts, yAxisIndex: 0, itemStyle: {color: '#5470c6'}, barMaxWidth: 50 },
                { name: '平均评价字数', type: 'line', data: avgLens, yAxisIndex: 1, itemStyle: {color: '#ee6666'}, symbolSize: 8, lineStyle: {width: 3} }
            ]
        });

        c2.setOption({
            tooltip: { trigger: 'item' },
            legend: { top: 'bottom', data: hotels, type: 'scroll' },
            radar: {
                indicator: indicator,
                shape: 'circle',
                splitNumber: 5,
                radius: '65%',         // 将雷达图放大
                center: ['50%', '42%'], // 稍微偏上一点给图例留出空间
                axisName: { color: '#333', fontSize: 14, fontWeight: 'bold' }
            },
            series: [{
                name: '运营指标对比',
                type: 'radar',
                data: radarSeriesData,
                symbolSize: 6,
                lineStyle: { width: 2 },
                areaStyle: { opacity: 0.15 } // 加深一点面积颜色
            }]
        });
    }

    async function init() {
        c1 = echarts.init(document.getElementById('c1'));
        c2 = echarts.init(document.getElementById('c2'));
        loadData();
        window.addEventListener('resize', () => { c1.resize(); c2.resize(); });
    }
    window.onload = init;
</script>
</body>
</html>
