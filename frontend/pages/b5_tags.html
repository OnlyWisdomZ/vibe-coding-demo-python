<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f0f2f5; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; }
        .chart-container { flex: 1; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); padding: 20px; }
        .chart { width: 100%; height: 400px; }
        h3 { margin: 0 0 15px 0; color: #333; text-align: center; }
    </style>
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
</head>
<body>

<div class="row">
    <!-- 好评标签 -->
    <div class="chart-container">
        <h3>正面评价标签高频词</h3>
        <div id="c1" class="chart"></div>
    </div>
    <!-- 差评标签 -->
    <div class="chart-container">
        <h3>负面/吐槽标签高频词</h3>
        <div id="c2" class="chart"></div>
    </div>
</div>

<script>
    async function init() {
        const c1 = echarts.init(document.getElementById('c1'));
        const c2 = echarts.init(document.getElementById('c2'));

        const res = await axios.get('http://127.0.0.1:8000/api/analysis/b5_tags');
        const data = res.data.data;

        // 这里的原始数据在后端是按从大到小排列的
        // 为了让条形图数值最大的在最上面，需要将数组反转
        // 使用扩展运算符深拷贝，避免原地改变引用导致任何对不上的情况
        const goodData = [...data.good_tags].reverse();
        c1.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'value' },
            yAxis: { 
                type: 'category', 
                data: goodData.map(d=>d.name),
                axisLabel: { interval: 0 } // 强制显示所有标签，防止 echarts 自动隐藏重叠文本
            },
            series: [{
                name: '出现频次',
                type: 'bar',
                data: goodData.map(d=>d.value),
                itemStyle: { color: '#91cc75' },
                label: { show: true, position: 'right' }
            }]
        });

        const badData = [...data.bad_tags].reverse();
        c2.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'value' },
            yAxis: { 
                type: 'category', 
                data: badData.map(d=>d.name),
                axisLabel: { interval: 0 } // 强制显示所有标签
            },
            series: [{
                name: '出现频次',
                type: 'bar',
                data: badData.map(d=>d.value),
                itemStyle: { color: '#ee6666' },
                label: { show: true, position: 'right' }
            }]
        });

        window.addEventListener('resize', () => { c1.resize(); c2.resize(); });
    }
    window.onload = init;
</script>
</body>
</html>
