<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f0f2f5; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; }
        .chart-container { flex: 1; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); padding: 20px; }
        .chart { width: 100%; height: 400px; }
        h3 { margin: 0 0 15px 0; color: #333; text-align: center; }
    </style>
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
</head>
<body>

<div class="row">
    <!-- 好评标签 -->
    <div class="chart-container">
        <h3>正面评价标签高频词</h3>
        <div id="c1" class="chart"></div>
    </div>
    <!-- 差评标签 -->
    <div class="chart-container">
        <h3>负面/吐槽标签高频词</h3>
        <div id="c2" class="chart"></div>
    </div>
</div>

<script>
    async function init() {
        const c1 = echarts.init(document.getElementById('c1'));
        const c2 = echarts.init(document.getElementById('c2'));

        const res = await axios.get('http://127.0.0.1:8000/api/analysis/b5_tags');
        const data = res.data.data;

        // 这里的原始数据在后端是按从大到小排列的
        // 为了让条形图数值最大的在最上面，需要将数组反转
        // 使用扩展运算符深拷贝，避免原地改变引用导致任何对不上的情况
        const goodData = data.good_tags.slice(0, 10);
        const maxGood = goodData[0].value;
        c1.setOption({
            tooltip: { trigger: 'item' },
            radar: {
                indicator: goodData.map(d => ({ name: d.name, max: maxGood * 1.2 })),
                shape: 'polygon',
                splitNumber: 4,
                axisName: { color: '#555', fontSize: 12 },
                splitArea: { areaStyle: { color: ['rgba(145,204,117,0.05)', 'rgba(145,204,117,0.1)'] } },
                splitLine: { lineStyle: { color: 'rgba(145,204,117,0.3)' } }
            },
            series: [{
                type: 'radar',
                data: [{
                    value: goodData.map(d => d.value),
                    name: '出现频次',
                    areaStyle: { color: 'rgba(145,204,117,0.4)' },
                    lineStyle: { color: '#91cc75', width: 2 },
                    itemStyle: { color: '#91cc75' },
                    symbol: 'circle',
                    symbolSize: 6
                }]
            }]
        });

        const badData = data.bad_tags;
        c2.setOption({
            tooltip: { formatter: function(info) { return info.name + ': ' + info.value + '次'; } },
            series: [{
                type: 'treemap',
                width: '92%',
                height: '85%',
                roam: false,
                nodeClick: false,
                breadcrumb: { show: false },
                label: { show: true, formatter: '{b}\n{c}次', fontSize: 12, overflow: 'break', lineOverflow: 'truncate' },
                upperLabel: { show: false },
                itemStyle: { borderColor: '#fff', borderWidth: 2, gapWidth: 2 },
                levels: [{
                    colorSaturation: [0.3, 0.7],
                    itemStyle: { borderColorSaturation: 0.5, gapWidth: 3, borderWidth: 2 }
                }],
                data: badData.map(d => ({ name: d.name, value: d.value })),
                color: ['#ee6666', '#f5a0a0', '#d94e4e', '#ff8c8c', '#c23531', '#e67373']
            }]
        });

        window.addEventListener('resize', () => { c1.resize(); c2.resize(); });
    }
    window.onload = init;
</script>
</body>
</html>
