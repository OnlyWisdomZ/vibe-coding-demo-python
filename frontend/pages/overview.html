<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f0f2f5; }
        .chart-container { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        .chart { width: 100%; height: 500px; }
        h3 { margin: 0 0 15px 0; color: #333; }
    </style>
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
</head>
<body>

<div class="chart-container"><h3>评论内容长度(字数)分布</h3><div id="c1" class="chart"></div></div>
<script>
    const API = 'http://127.0.0.1:8000/api';
    async function init() {
        const myChart1 = echarts.init(document.getElementById('c1'));
        try {
            const res = await axios.get(API + '/stats');
            const data = res.data.data.length_distribution;
            myChart1.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c}条 ({d}%)' },
                legend: { bottom: '2%', type: 'scroll', textStyle: { fontSize: 12 } },
                color: ['#5470c6','#91cc75','#fac858','#ee6666','#73c0de','#3ba272','#fc8452','#9a60b4'],
                series: [{
                    type: 'pie',
                    radius: ['15%', '60%'],
                    center: ['50%', '45%'],
                    roseType: 'area',
                    itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 3 },
                    label: {
                        show: true,
                        formatter: '{b}\n{c}条',
                        fontSize: 12,
                        color: '#555'
                    },
                    labelLine: { length: 15, length2: 20, smooth: true },
                    emphasis: {
                        itemStyle: { shadowBlur: 12, shadowColor: 'rgba(0,0,0,0.2)' }
                    },
                    animationType: 'scale',
                    animationEasing: 'elasticOut',
                    data: data.map(item => ({name: item.range, value: item.count}))
                }]
            });
            window.addEventListener('resize', () => myChart1.resize());
        } catch(e) {}
    }
    window.onload = init;
</script>

</body>
</html>
