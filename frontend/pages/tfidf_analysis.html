<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f0f2f5; }
        .chart-container { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; position: relative; }
        .chart { width: 100%; height: 500px; }
        h3 { margin: 0 0 15px 0; color: #333; }
        .btn-detail { position: absolute; top: 20px; right: 20px; padding: 8px 16px; background-color: #1890ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn-detail:hover { background-color: #40a9ff; }
    </style>
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
</head>
<body>

<div class="chart-container">
    <h3>TF-IDF 评论关键词权重分析</h3>
    <a href="tfidf_top20.html" class="btn-detail">查看Top 20词详情</a>
    <div id="c1" class="chart"></div>
</div>
<script>
    async function init() {
        const myChart1 = echarts.init(document.getElementById('c1'));
        try {
            const res = await axios.get('http://127.0.0.1:8000/api/analysis/tfidf');
            // Filter out the word "花间"
            const data = res.data.data.filter(d => d.word !== '花间');
            myChart1.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: data.map(d=>d.word), axisLabel: { interval: 0, rotate: 30 } },
                yAxis: { type: 'value', name: '权重' },
                series: [{ type: 'bar', data: data.map(d=>d.weight), itemStyle: { color: '#73c0de' } }]
            });
            window.addEventListener('resize', () => myChart1.resize());
        } catch(e) {}
    }
    window.onload = init;
</script>

</body>
</html>
