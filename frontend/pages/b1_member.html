<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f0f2f5; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; }
        .chart-container { flex: 1; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); padding: 20px; }
        .chart { width: 100%; height: 400px; }
        h3 { margin: 0 0 15px 0; color: #333; text-align: center; }
    </style>
    <script src="../static/echarts.min.js"></script>
    <script src="../static/axios.min.js"></script>
</head>
<body>

<div class="row">
    <!-- 等级分布 -->
    <div class="chart-container">
        <h3>消费者会员等级分布</h3>
        <div id="c1" class="chart"></div>
    </div>
    <!-- 消费特征：带图率与字数 -->
    <div class="chart-container">
        <h3>各等级消费与分享特征</h3>
        <div id="c2" class="chart"></div>
    </div>
</div>

<script>
    async function init() {
        const c1 = echarts.init(document.getElementById('c1'));
        const c2 = echarts.init(document.getElementById('c2'));

        const res = await axios.get('http://127.0.0.1:8000/api/analysis/b1_member');
        const data = res.data.data;

        c1.setOption({
            tooltip: { trigger: 'item' },
            legend: { bottom: '0%' },
            series: [{
                type: 'pie', radius: ['40%', '70%'],
                data: data.distribution
            }]
        });

        const names = data.features.map(d => d.name);
        const fileRates = data.features.map(d => d.file_rate);
        const avgLens = data.features.map(d => d.avg_len);

        c2.setOption({
            tooltip: { 
                trigger: 'item',
                formatter: function (params) {
                    return `${params.name}<br/>${params.marker} ${params.seriesName}: <b>${params.value}</b>`;
                }
            },
            legend: { data: ['带图率(%)', '平均评论字数'] },
            xAxis: { type: 'category', data: names },
            yAxis: [
                { type: 'value', name: '带图率(%)', position: 'left' },
                { type: 'value', name: '字数', position: 'right' }
            ],
            series: [
                { name: '带图率(%)', type: 'bar', data: fileRates, yAxisIndex: 0, itemStyle: {color: '#5470c6'} },
                { name: '平均评论字数', type: 'line', data: avgLens, yAxisIndex: 1, itemStyle: {color: '#91cc75'} }
            ]
        });

        window.addEventListener('resize', () => { c1.resize(); c2.resize(); });
    }
    window.onload = init;
</script>
</body>
</html>
