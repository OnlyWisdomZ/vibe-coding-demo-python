<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>所有评论 LDA 主题分析可视化</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f0f2f5; }
        .header { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); padding: 15px 20px; margin-bottom: 20px; position: relative;}
        h2 { margin: 0; color: #333; font-size: 18px;}
        .btn-back { position: absolute; top: 15px; right: 20px; background-color: #fff; color: #606266; border: 1px solid #dcdfe6; padding: 6px 15px; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px;}
        .btn-back:hover { background-color: #f5f7fa; color: #409eff; border-color: #c6e2ff;}
        .btn-export { position: absolute; top: 15px; right: 120px; background-color: #409eff; color: #fff; border: 1px solid #409eff; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 14px;}
        .btn-export:hover { background-color: #66b1ff; border-color: #66b1ff;}
        #iframe-container { width: 100%; height: 800px; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); overflow: hidden;}
        iframe { width: 100%; height: 100%; border: none;}
        #loading { padding: 40px; text-align: center; color: #666;}
    </style>
</head>
<body>

<div class="header">
    <h2>所有评论 LDA 主题分析可视化</h2>
    <button id="exportBtn" class="btn-export">导出txt</button>
    <a href="lda_analysis.html" class="btn-back">返回上一页</a>
</div>

<div id="iframe-container">
    <div id="loading">由于需要进行模型训练和计算，这大约需要几十秒的时间，请耐心等待...</div>
    <iframe id="lda-frame" src="" style="display:none;"></iframe>
</div>

<script>
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const topicCount = params.get('topics');
        const iframe = document.getElementById('lda-frame');
        const url = new URL("http://127.0.0.1:8000/api/analysis/lda_pyldavis");
        url.searchParams.set('type', 'all');
        if (topicCount) {
            url.searchParams.set('topics', topicCount);
            document.querySelector('.header h2').innerText = `所有评论 LDA 主题分析可视化（${topicCount}个主题）`;
        }
        iframe.src = url.toString();

        iframe.onload = function() {
            document.getElementById('loading').style.display = 'none';
            iframe.style.display = 'block';
        };
    };

    document.getElementById('exportBtn').onclick = function() {
        const params = new URLSearchParams(window.location.search);
        const topicCount = params.get('topics') || 4;
        const url = `http://127.0.0.1:8000/api/analysis/lda_topics?type=all&topics=${topicCount}`;
        fetch(url)
            .then(res => res.json())
            .then(result => {
                if (result.code !== 200 || !result.data) {
                    alert('数据尚未准备好，请稍后再试');
                    return;
                }
                const topics = result.data.topics || [];
                let content = '全部评论主题关键词概览：\n\n';
                topics.forEach((t, idx) => {
                    const kwWithWeights = t.keywords_with_weights || [];
                    const formatted = kwWithWeights.map(item => item.weight + '*"' + item.word + '"').join(' + ');
                    content += '主题 ' + (idx + 1) + ': ' + formatted + '\n';
                });
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = '全部评论LDA主题关键词.txt';
                a.click();
                URL.revokeObjectURL(a.href);
            })
            .catch(() => alert('导出失败，请稍后再试'));
    };
</script>

</body>
</html>
