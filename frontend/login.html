<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 花间堂酒店评论分析系统</title>
    <script src="static/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('images/login.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
            overflow: hidden;
        }

        /* 背景遮罩层 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(46, 79, 79, 0.7) 0%, rgba(85, 107, 47, 0.5) 100%);
            z-index: 1;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.1);
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35),
                        0 0 0 1px rgba(255, 255, 255, 0.15);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .login-title {
            font-size: 26px;
            font-weight: 600;
            color: #2d4a3e;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #6b7c72;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #5a6e64;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #9aab9f;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #d4ddd7;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            background: #f8faf8;
        }

        .form-group input:focus {
            border-color: #5d8a66;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(93, 138, 102, 0.15);
        }

        .form-group input:focus + .icon,
        .input-wrapper:hover .icon {
            color: #5d8a66;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #5d8a66 0%, #3d6b47 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(61, 107, 71, 0.4);
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(61, 107, 71, 0.5);
            background: linear-gradient(135deg, #6a9a73 0%, #4a7c54 100%);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #c0392b;
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #fdeaea;
            border-radius: 8px;
            display: none;
        }

        .error-msg.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e5ebe7;
        }

        .register-link a {
            color: #5d8a66;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .register-link a:hover {
            color: #3d6b47;
        }

        /* 装饰线条 */
        .decorative-line {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #5d8a66, #8fb996);
            margin: 0 auto 15px;
            border-radius: 2px;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-box {
                padding: 40px 25px;
            }
            .login-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <span class="logo-icon">🏡</span>
                <div class="decorative-line"></div>
                <h1 class="login-title">花间堂评论分析系统</h1>
                <p class="login-subtitle">酒店用户评论数据可视化分析平台</p>
            </div>

            <div class="form-group">
                <label for="username">用户名</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="请输入用户名" value="admin">
                    <span class="icon">👤</span>
                </div>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="请输入密码" value="123456">
                    <span class="icon">🔒</span>
                </div>
            </div>

            <button class="login-btn" onclick="doLogin()">登 录</button>

            <div id="error-msg" class="error-msg"></div>

            <div class="register-link">
                <a href="http://127.0.0.1:8000/register">还没有账号？立即注册 →</a>
            </div>
        </div>
    </div>

    <script>
        async function doLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            
            if (!u) {
                showError('请输入用户名');
                return;
            }
            if (!p) {
                showError('请输入密码');
                return;
            }

            try {
                const res = await axios.post('http://127.0.0.1:8000/api/login', {username: u, password: p});
                if(res.data.code === 200) {
                    localStorage.setItem('token', res.data.data.token);
                    localStorage.setItem('username', res.data.data.username);
                    window.location.href = 'index.html';
                } else {
                    showError(res.data.message);
                }
            } catch(e) {
                showError('网络错误，请检查后端服务是否运行');
            }
        }

        function showError(msg) {
            const errorEl = document.getElementById('error-msg');
            errorEl.innerText = msg;
            errorEl.classList.add('show');
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 3000);
        }

        // 回车键登录
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doLogin();
            }
        });
    </script>
</body>
</html>
