<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 华住会评论分析</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="static/axios.min.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2 class="login-title">🏨 华住会评论分析系统</h2>
            <div class="form-group">
                <input type="text" id="username" placeholder="用户名 (admin)" value="admin">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="密码 (123456)" value="123456">
            </div>
            <button class="login-btn" onclick="doLogin()">登录</button>
            <div id="error-msg" class="error-msg" style="color:red; margin-top:10px; text-align:center;"></div>
            <div style="text-align: center; margin-top: 15px; font-size: 14px;">
                <a href="http://127.0.0.1:8000/register" style="color: #1890ff; text-decoration: none;">没有账号？去注册</a>
            </div>
        </div>
    </div>

    <script>
        async function doLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            try {
                const res = await axios.post('http://127.0.0.1:8000/api/login', {username: u, password: p});
                if(res.data.code === 200) {
                    localStorage.setItem('token', res.data.data.token);
                    localStorage.setItem('username', res.data.data.username);
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('error-msg').innerText = res.data.message;
                }
            } catch(e) {
                document.getElementById('error-msg').innerText = "网络错误，请检查后端是否运行";
            }
        }
    </script>
</body>
</html>
